version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: glam-ai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodata:/data/db
    networks:
      - glam-ai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glam-ai-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mongodb://admin:admin123@mongodb:27017/glam_ai?authSource=admin
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      DEBUG: "True"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - glam-ai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glam-ai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - glam-ai-network

volumes:
  mongodata:

networks:
  glam-ai-network:
    driver: bridge
